<!doctype html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
  <script src="{% static 'js/jquery.js' %}"></script>
  <script src="{% static 'js/bootstrap.min.js' %}"></script>
</head>

<body>
 <section class="vh-100" style="background-color: #b4c6ff;">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-xl-10">
        <div class="card" style="border-radius: 1rem;">
          <div class="row g-0 align-items-stretch">
            <div class="col-md-6 col-lg-5 d-none d-md-flex">
              <img src="https://wallpapercave.com/wp/wp15188731.webp"
                alt="login form" class="w-100 h-100" style="border-radius: 1rem 0 0 1rem; object-fit: cover; object-position: center;" />
            </div>
            <div class="col-md-6 col-lg-7 d-flex align-items-center">
              <div class="card-body p-4 p-lg-5 text-black">

                <form action="/" method="post">
                  {% csrf_token %}

                  <div class="d-flex align-items-center mb-3 pb-1">
                    <i class="fas fa-cubes fa-2x me-3" style="color: #ff6219;"></i>
                    <span class="h1 fw-bold mb-0">CarService</span>
                  </div>

                  <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px;">Entre com sua conta</h5>

                  <div data-mdb-input-init class="form-outline mb-4">
                    <label class="form-label" for="usuario">Usuário</label>
                    <input type="text" id="usuario" name="usuario" class="form-control form-control-lg" placeholder="Digite seu nome de usuário" value="{{ request.POST.usuario|default:'' }}" autocomplete="username" required/>
                  </div>

                  <div data-mdb-input-init class="form-outline mb-4">
                    <label class="form-label" for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" class="form-control form-control-lg" placeholder="Digite sua senha" autocomplete="current-password" required/>
                  </div>

                  <div class="pt-1 mb-4">
                    <button data-mdb-button-init data-mdb-ripple-init class="btn btn-dark btn-lg btn-block" type="submit">Login</button>
                  </div>

                  {% if mensagem %}
                    <div class="alert alert-danger" role="alert">
                      {{ mensagem }}
                    </div>
                  {% endif %}

                  <a class="small text-muted" href="#!">Esqueceu a senha?</a>
                  <p class="mb-5 pb-lg-2" style="color: #393f81;">Não tem uma conta? <a href="#!"
                      style="color: #393f81;">Registre-se aqui</a></p>
                  <a href="#!" class="small text-muted">Termos de Uso</a><br>
                  <a href="#!" class="small text-muted">Política de Privacidade</a>
                </form>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>

</html>
