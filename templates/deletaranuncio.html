{% extends "base.html" %}

{% block title %} Deletar Anúncio {{ anuncio.titulo }}{% endblock %}

{% block conteudo %}
<form action="{% url 'deletar-anuncio' anuncio.pk %}" method="post">
    {% csrf_token %}
    <center>
        <div class="alert alert-danger" role="alert">
            <p>Tem certeza que deseja excluir o anúncio do(a) {{ anuncio.veiculo.get_marca_display}} {{ anuncio.veiculo.modelo }}?</p>
        </div>
        <input type="submit" value="Confirmar" class="btn btn-danger">
    </center>
</form>
{% endblock %}
