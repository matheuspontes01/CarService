{% extends "base.html" %}

{% block title %}Edição do Veículo {{ veiculo.modelo }}{% endblock %}

{% block conteudo %}
<div class="card shadow-sm">
    <div class="card-body p-4 p-lg-5">
        <h1 class="h4 mb-4">Editar Veiculo</h1>

        <form action="{% url 'editar-veiculo' veiculo.pk %}" method="post" enctype="multipart/form-data" class="row g-3">
            {% csrf_token %}

            <div class="col-12 col-md-6">
                <label for="id_marca" class="form-label">Marca</label>
                {{ form.marca }}
            </div>

            <div class="col-12 col-md-6">
                <label for="id_modelo" class="form-label">Modelo</label>
                {{ form.modelo }}
            </div>

            <div class="col-12 col-md-6">
                <label for="id_ano" class="form-label">Ano</label>
                {{ form.ano }}
            </div>

            <div class="col-12 col-md-6">
                <label for="id_cor" class="form-label">Cor</label>
                {{ form.cor }}
            </div>

            <div class="col-12 col-md-6">
                <label for="id_combustivel" class="form-label">Combustivel</label>
                {{ form.combustivel }}
            </div>

            <div class="col-12 col-md-6">
                <label for="id_foto" class="form-label">Foto</label>
                {{ form.foto }}
            </div>

            <div class="col-12 d-flex gap-2 mt-2">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'listar-veiculos' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
